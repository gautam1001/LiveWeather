name: iOS CD Dry Run

on:
  workflow_run:
    workflows: ["iOS CI"]
    types: [completed]
    branches:
      - Development
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-cd-dry-run-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: true

jobs:
  cd-dry-run:
    name: CD Dry Run (after CI success)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Trigger summary
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Upstream workflow: ${{ github.event.workflow_run.name || 'manual' }}"
          echo "Upstream conclusion: ${{ github.event.workflow_run.conclusion || 'manual' }}"
          echo "Head branch: ${{ github.event.workflow_run.head_branch || github.ref_name }}"
          echo "Head SHA: ${{ github.event.workflow_run.head_sha || github.sha }}"

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/SourcePackages
          key: ${{ runner.os }}-spm-cd-${{ hashFiles('**/Package.resolved', 'Packages/**/Package.swift', 'LiveWeather.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-spm-cd-

      - name: Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project LiveWeather.xcodeproj -scheme LiveWeather

      - name: Build Release for iOS Simulator (unsigned)
        run: |
          set -o pipefail
          mkdir -p logs
          xcodebuild build \
            -project LiveWeather.xcodeproj \
            -scheme LiveWeather \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee logs/build-simulator.log

      - name: Package dry-run artifacts
        run: |
          set -e
          mkdir -p dist
          APP_PATH="build/DerivedData/Build/Products/Release-iphonesimulator/LiveWeather.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Simulator app not found at $APP_PATH"
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/LiveWeather-simulator.app.zip"

          {
            echo "LiveWeather CD Dry Run"
            echo "Commit: ${{ github.event.workflow_run.head_sha || github.sha }}"
            echo "Branch: ${{ github.event.workflow_run.head_branch || github.ref_name }}"
            echo "Date (UTC): $(date -u '+%Y-%m-%d %H:%M:%S')"
          } > dist/release-notes.md

      - name: Upload CD dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cd-dry-run-${{ github.run_number }}
          path: |
            dist
            logs
          retention-days: 14
