name: iOS CD Dry Run

on:
  workflow_run:
    workflows: ["iOS CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane to run"
        required: true
        default: cd_dry_run_dev
        type: choice
        options:
          - cd_dry_run_dev
          - cd_dry_run_qa_release
          - cd_dry_run_uat
          - cd_dry_run_prod
          - cd_dry_run_all

permissions:
  contents: read

concurrency:
  group: ios-cd-dry-run-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: true

jobs:
  cd-dry-run:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request' &&
        (
          github.event.workflow_run.pull_requests[0].base.ref == 'Development' ||
          github.event.workflow_run.pull_requests[0].base.ref == 'main'
        )
      )

    name: CD Dry Run (after CI success)
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Trigger summary
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Upstream workflow: ${{ github.event.workflow_run.name || 'manual' }}"
          echo "Upstream conclusion: ${{ github.event.workflow_run.conclusion || 'manual' }}"
          echo "Head branch: ${{ github.event.workflow_run.head_branch || github.ref_name }}"
          echo "Head SHA: ${{ github.event.workflow_run.head_sha || github.sha }}"

      - name: Set up Ruby and bundle install
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/SourcePackages
          key: ${{ runner.os }}-spm-cd-${{ hashFiles('**/Package.resolved', 'Packages/**/Package.swift', 'LiveWeather.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-spm-cd-

      - name: Xcode version
        run: xcodebuild -version

      - name: Select Fastlane lane
        id: select_lane
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LANE="${{ inputs.lane }}"
          else
            BASE_REF="${{ github.event.workflow_run.pull_requests[0].base.ref }}"
            if [ "$BASE_REF" = "Development" ]; then
              LANE="cd_dry_run_dev"
            elif [ "$BASE_REF" = "main" ]; then
              LANE="cd_dry_run_prod"
            else
              LANE="cd_dry_run_all"
            fi
          fi

          echo "lane=$LANE" >> "$GITHUB_OUTPUT"
          echo "Selected lane: $LANE"

      - name: Run Fastlane CD dry run
        run: bundle exec fastlane ios ${{ steps.select_lane.outputs.lane }}

      - name: Upload CD dry-run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cd-dry-run-${{ github.run_number }}
          path: |
            build/artifacts
            build/archives
            build/logs
            build/test_output
          retention-days: 14
