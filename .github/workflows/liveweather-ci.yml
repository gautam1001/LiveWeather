name: iOS CI

on:
  pull_request:
    branches:
      - Development
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: Code Quality (SwiftLint + SwiftFormat + Semgrep)
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Install code quality tools
        run: |
          brew install swiftlint swiftformat
          python3 -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/pip install semgrep

      - name: Prepare quality reports folder
        run: mkdir -p QualityReports

      - name: Run SwiftLint
        id: swiftlint
        continue-on-error: true
        run: |
          set -o pipefail
          swiftlint --version | tee QualityReports/swiftlint-version.txt
          swiftlint lint --strict --reporter github-actions-logging 2>&1 | tee QualityReports/swiftlint.log

      - name: Run SwiftFormat (lint mode)
        id: swiftformat
        continue-on-error: true
        run: |
          set -o pipefail
          swiftformat --version | tee QualityReports/swiftformat-version.txt
          swiftformat . --lint --reporter github-actions-log 2>&1 | tee QualityReports/swiftformat.log

      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        run: |
          set -o pipefail
          ./.venv/bin/semgrep --version | tee QualityReports/semgrep-version.txt
          ./.venv/bin/semgrep scan \
          --config p/swift \
          --error \
          --json \
          --output QualityReports/semgrep.json \
          --exclude .build \
          --exclude DerivedData \
          --exclude .venv \
          . 2>&1 | tee QualityReports/semgrep.log

      - name: Upload code quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-${{ github.run_number }}
          path: QualityReports
          retention-days: 7
      
      - name: Print quality failures
        if: always()
        run: |
          if [ "${{ steps.swiftlint.outcome }}" != "success" ]; then
            echo "===== SwiftLint failures ====="
            tail -n 200 QualityReports/swiftlint.log || true
          fi

          if [ "${{ steps.swiftformat.outcome }}" != "success" ]; then
            echo "===== SwiftFormat failures ====="
            tail -n 200 QualityReports/swiftformat.log || true
          fi

      - name: Fail if any quality check failed
        if: always()
        run: |
          echo "swiftlint=${{ steps.swiftlint.outcome }}"
          echo "swiftformat=${{ steps.swiftformat.outcome }}"
          echo "semgrep=${{ steps.semgrep.outcome }}"

          [ "${{ steps.swiftlint.outcome }}" = "success" ] || echo "::error::SwiftLint failed"
          [ "${{ steps.swiftformat.outcome }}" = "success" ] || echo "::error::SwiftFormat failed"
          [ "${{ steps.semgrep.outcome }}" = "success" ] || echo "::error::Semgrep failed"

          if [ "${{ steps.swiftlint.outcome }}" != "success" ] || \
             [ "${{ steps.swiftformat.outcome }}" != "success" ] || \
             [ "${{ steps.semgrep.outcome }}" != "success" ]; then
            exit 1
          fi

  sonarcloud:
    name: SonarQube Cloud Scan
    runs-on: ubuntu-latest
    needs: [code-quality, app-tests, package-tests]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
            
  app-tests:
    name: App Unit Tests
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', 'Packages/**/Package.swift', 'LiveWeather.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Xcode Version
        run: xcodebuild -version

      - name: Resolve Swift Packages
        run: xcodebuild -resolvePackageDependencies -project LiveWeather.xcodeproj -scheme LiveWeather

      - name: Run LiveWeatherTests
        run: |
          set -o pipefail
          mkdir -p TestResults
          xcodebuild test \
            -project LiveWeather.xcodeproj \
            -scheme LiveWeather \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -only-testing:LiveWeatherTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults/LiveWeatherTests.xcresult \
            2>&1 | tee TestResults/liveweathertests.log
            
      - name: Coverage Report (soft gate)
        if: always()
        continue-on-error: true
        run: |
          xcrun xccov view --report TestResults/LiveWeatherTests.xcresult > TestResults/coverage.txt
          TOTAL=$(grep '^TOTAL' TestResults/coverage.txt | awk '{print $NF}')
          echo "### Coverage (Soft Gate)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Total line coverage: **${TOTAL:-N/A}**" >> "$GITHUB_STEP_SUMMARY"


      - name: Collect flaky-test diagnostics (on failure)
        if: failure()
        run: |
          mkdir -p TestResults/debug
          xcrun simctl list devices > TestResults/debug/simctl-devices.txt
          xcrun simctl list runtimes > TestResults/debug/simctl-runtimes.txt
          xcodebuild -showBuildSettings -project LiveWeather.xcodeproj -scheme LiveWeather > TestResults/debug/build-settings.txt

      - name: Upload app test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-tests-${{ github.run_number }}
          path: TestResults
          retention-days: 7

  package-tests:
    name: Package Tests
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v5

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Packages/**/Package.swift', '**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Run package tests
        run: |
          set -o pipefail
          mkdir -p TestResults
          swift test --package-path Packages/Domain 2>&1 | tee -a TestResults/package-tests.log
          swift test --package-path Packages/Data 2>&1 | tee -a TestResults/package-tests.log
          swift test --package-path Packages/Presentation 2>&1 | tee -a TestResults/package-tests.log

      - name: Upload package test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-tests-${{ github.run_number }}
          path: TestResults
          retention-days: 7
